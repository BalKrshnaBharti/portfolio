<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bal Krishna Bharti | AI Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="particles" id="particles"></div>
<div id="progress-bar"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo" id="nav-logo"></div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#hackathons">Hackathons</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-content" id="hero-content"></div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="container reveal" id="about-section"></div>
</section>

<!-- SKILLS -->
<section id="skills" class="bg-alt">
  <div class="container reveal" id="skills-section"></div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <div class="container reveal" id="experience-section"></div>
</section>

<!-- PROJECTS -->
<section id="projects" class="bg-alt">
  <div class="container reveal" id="projects-section"></div>
</section>

<!-- HACKATHONS -->
<section id="hackathons">
  <div class="container reveal" id="hackathons-section"></div>
</section>

<!-- CERTIFICATIONS -->
<section class="bg-alt">
  <div class="container reveal" id="certs-section"></div>
</section>

<!-- AWARDS -->
<section>
  <div class="container reveal" id="awards-section"></div>
</section>

<!-- EDUCATION -->
<section class="bg-alt">
  <div class="container reveal" id="education-section"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="container reveal" id="contact-section"></div>
</section>

<footer id="footer"></footer>

<!-- DATA + JS -->
<script src="data/content.js"></script>
<script src="js/main.js"></script>
<script>
// ============================================================
//  RENDERER — Ye content.js ka data le ke HTML banata hai
//  MAT CHHONA ISKO 😄
// ============================================================

const D = PORTFOLIO;

// NAV LOGO
document.getElementById('nav-logo').textContent = D.initials;

// PAGE TITLE
document.title = `${D.name} | AI Engineer`;

// HERO
document.getElementById('hero-content').innerHTML = `
  ${D.available ? '<div class="hero-badge">⚡ Available for new opportunities</div>' : ''}
  <h1>${D.name.split(' ').slice(0,-1).join(' ')} <span>${D.name.split(' ').slice(-1)}</span></h1>
  <p class="hero-sub"><span id="typing-text"></span><span class="cursor">|</span></p>
  <p class="hero-tagline">${D.tagline}</p>
  <div class="hero-btns">
    <a href="#experience" class="btn-primary">View My Work</a>
    <a href="#contact" class="btn-outline">Get in Touch</a>
  </div>
  <div class="floating-chips">
    ${D.heroChips.map(c=>`<span class="chip">${c}</span>`).join('')}
  </div>
`;

// ABOUT
document.getElementById('about-section').innerHTML = `
  <p class="section-label">Who I Am</p>
  <h2 class="section-title">About Me</h2>
  <div class="divider"></div>
  <div class="about-grid">
    <div class="about-left">
      <img src="photo.jpg" class="about-avatar" style="object-fit:cover;" alt="Bal Krishna">
      <div class="stats-row">
        ${D.stats.map(s=>`
          <div class="stat-card">
            <div class="stat-num">${s.num}</div>
            <div class="stat-label">${s.label}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="about-right">
      ${D.about.map(p=>`<p>${p}</p>`).join('')}
    </div>
  </div>
`;

// SKILLS
document.getElementById('skills-section').innerHTML = `
  <p class="section-label">Technical Skills</p>
  <h2 class="section-title">My Expertise</h2>
  <div class="divider"></div>
  <div class="skills-grid">
    ${D.skills.map(s=>`
      <div class="card-3d skill-category">
        <h3>${s.category}</h3>
        <div class="skill-tags">
          ${s.tags.map(t=>`<span class="skill-tag">${t}</span>`).join('')}
        </div>
      </div>`).join('')}
  </div>
`;

// EXPERIENCE
const dotClass = {accent:'dot-accent', purple:'dot-purple', cyan:'dot-cyan', gray:'dot-gray'};
document.getElementById('experience-section').innerHTML = `
  <p class="section-label">Work History</p>
  <h2 class="section-title">Experience</h2>
  <div class="divider"></div>
  <div class="timeline">
    ${D.experience.map(e=>`
      <div class="timeline-item">
        <div class="timeline-dot ${dotClass[e.color]||'dot-accent'}"></div>
        <div class="card-3d">
          <div class="timeline-header">
            <span class="timeline-role">${e.role}</span>
            <span class="timeline-date">${e.date}</span>
          </div>
          <div class="timeline-company">${e.company}</div>
          <ul class="timeline-points">
            ${e.points.map(p=>`<li>${p}</li>`).join('')}
          </ul>
        </div>
      </div>`).join('')}
  </div>
`;

// PROJECTS
const iconClass = {blue:'icon-blue', purple:'icon-purple', cyan:'icon-cyan'};
document.getElementById('projects-section').innerHTML = `
  <p class="section-label">What I've Built</p>
  <h2 class="section-title">Key Projects</h2>
  <div class="divider"></div>
  <div class="projects-grid">
    ${D.projects.map(p=>`
      <div class="card-3d project-card">
        <div class="project-icon ${iconClass[p.color]||'icon-blue'}">${p.icon}</div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <div class="project-tags">
          ${p.tags.map(t=>`<span class="project-tag">${t}</span>`).join('')}
        </div>
      </div>`).join('')}
  </div>
`;

// HACKATHONS
document.getElementById('hackathons-section').innerHTML = `
  <p class="section-label">Competitions</p>
  <h2 class="section-title">Hackathons</h2>
  <div class="divider"></div>
  <div class="hackathons-grid">
    ${D.hackathons.map(h=>`
      <div class="hackathon-card">
        <div class="hack-org">${h.org}</div>
        <div class="hack-title">${h.title}</div>
        <div class="hack-desc">${h.desc}</div>
      </div>`).join('')}
  </div>
`;

// CERTS
document.getElementById('certs-section').innerHTML = `
  <p class="section-label">Credentials</p>
  <h2 class="section-title">Certifications</h2>
  <div class="divider"></div>
  <div class="certs-grid">
    ${D.certifications.map(c=>`
      <div class="cert-card card-3d">
        <div class="cert-icon">${c.icon}</div>
        <div class="cert-name">${c.name}</div>
        <div class="cert-issuer">${c.issuer}</div>
      </div>`).join('')}
  </div>
`;

// AWARDS
document.getElementById('awards-section').innerHTML = `
  <p class="section-label">Recognition</p>
  <h2 class="section-title">Honors & Awards</h2>
  <div class="divider"></div>
  <div class="awards-list">
    ${D.awards.map(a=>`
      <div class="award-item">
        <span class="award-emoji">${a.emoji}</span>
        <div>
          <div class="award-name">${a.name}</div>
          <div class="award-date">${a.date}</div>
        </div>
      </div>`).join('')}
  </div>
`;

// EDUCATION
document.getElementById('education-section').innerHTML = `
  <p class="section-label">Academic Background</p>
  <h2 class="section-title">Education</h2>
  <div class="divider"></div>
  ${D.education.map(e=>`
    <div class="card-3d edu-card">
      <div class="edu-icon">${e.icon}</div>
      <div>
        <div class="edu-uni">${e.uni}</div>
        <div class="edu-deg">${e.degree} · ${e.place} · ${e.years}</div>
        <span class="edu-cgpa">CGPA: ${e.cgpa}</span>
      </div>
    </div>`).join('')}
`;

// CONTACT
document.getElementById('contact-section').innerHTML = `
  <p class="section-label">Get In Touch</p>
  <h2 class="section-title">Contact</h2>
  <div class="divider"></div>
  <p style="color:var(--muted);margin-bottom:2rem;line-height:1.7">Open to AI/ML and GenAI roles in Bhubaneswar, Kolkata, Hyderabad, and Bangalore.</p>
  <div class="contact-grid">
    <a href="mailto:${D.email}" class="contact-card">
      <span class="contact-icon">📧</span>
      <div><div class="contact-label">Email</div><div class="contact-val">${D.email}</div></div>
    </a>
    <a href="${D.linkedin}" target="_blank" class="contact-card">
      <span class="contact-icon">💼</span>
      <div><div class="contact-label">LinkedIn</div><div class="contact-val">${D.name}</div></div>
    </a>
    <a href="tel:${D.phone}" class="contact-card">
      <span class="contact-icon">📞</span>
      <div><div class="contact-label">Phone</div><div class="contact-val">${D.phone}</div></div>
    </a>
    <a href="${D.github}" target="_blank" class="contact-card">
      <span class="contact-icon">🐙</span>
      <div><div class="contact-label">GitHub</div><div class="contact-val">View Projects</div></div>
    </a>
  </div>
`;

// FOOTER
document.getElementById('footer').innerHTML = `<p>${D.footerText}</p>`;
</script>
</body>
</html>
